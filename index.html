<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NCT 测试页面</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 50px auto;
      padding: 20px;
      background: #f5f5f5;
    }
    .container {
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      text-align: center;
    }
    h1 {
      color: #333;
      margin-bottom: 20px;
    }
    .links {
      margin-top: 30px;
    }
    .links a {
      display: block;
      padding: 15px;
      margin: 10px 0;
      background: #667eea;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-size: 18px;
      transition: all 0.3s;
    }
    .links a:hover {
      background: #764ba2;
      transform: translateY(-2px);
    }
    .status {
      margin-top: 20px;
      padding: 15px;
      background: #d4edda;
      color: #155724;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎉 NCT 测试页面</h1>
    <p>如果你能看到这个页面，说明 GitHub Pages 工作正常！</p>
    
    <div class="status">
      ✅ 页面加载成功<br>
      当前时间：<span id="time"></span>
    </div>
    
    <div class="links">
      <a href="nct后台.html">📊 打开数据后台</a>
      <a href="nct-test.html">📝 开始人格测试</a>
      <a href="nct后台-调试版.html">🔍 打开调试版后台</a>
    </div>
    
    <p style="margin-top: 40px; color: #999; font-size: 14px;">
      如果点击上面的链接显示空白，请告诉我<br>
      我们可以继续排查问题
    </p>
  </div>
  
  <script>
    document.getElementById('time').textContent = new Date().toLocaleString('zh-CN');
    console.log('✅ 测试页面加载成功！');
    console.log('当前 URL:', window.location.href);
  </script>
</body>
</html>
